# Gaps
# ─────────────────────────────────────────────────────────────────

gaps:
  - id: GAP-001
    area: multi-cluster
    description: "fleet-agent reporter.rs is entirely stubbed. No real metrics flow from spoke clusters."
    severity: high
    status: "Simulated agents deployed; real agent implementation pending"

  - id: GAP-002
    area: soak
    description: "No 72-hour soak. Longest verified is 8 hours."
    severity: medium
    status: "8-hour soak passed. 72-hour requires dedicated cluster window."

  - id: GAP-003
    area: security
    description: "104-item security audit checklist at Not Started."
    severity: high
    status: "Container hardening done. Supply chain CI active. No formal audit."

  - id: GAP-004
    area: persistence
    description: "All soak tests ran with in-memory stores. PostgreSQL persistence not soak-tested."
    severity: medium
    status: red

  - id: GAP-005
    area: multi-tenant
    description: "Tenant governance is unit-tested but not soak-tested under concurrent contention."
    severity: medium
    status: red

  - id: GAP-006
    area: observability
    description: "Go controller metrics are expvar JSON, not Prometheus text. Gateway /metrics is a stub."
    severity: medium
    status: red

  - id: GAP-007
    area: chaos
    description: "Single GCL pod saturates at 200 concurrent. Horizontal GCL scaling not tested."
    severity: low
    status: "Known architectural boundary, documented"
