{{- if and .Values.rbac.create .Values.controller.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fleet-llm-d.fullname" . }}-controller
  labels:
    {{- include "fleet-llm-d.labels" . | nindent 4 }}
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
rules:
  - apiGroups: ["fleet.llm-d.ai"]
    resources:
      - fleetclusters
      - fleetinferencepools
      - fleetintents
      - fleetoperations
      - fleetroutingpolicies
      - fleetscalingpolicies
      - kvcachetransferpolicies
      - modellifecycles
      - placementpolicies
      - tenantprofiles
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["fleet.llm-d.ai"]
    resources:
      - fleetclusters/status
      - fleetinferencepools/status
      - fleetintents/status
      - fleetoperations/status
      - fleetroutingpolicies/status
      - fleetscalingpolicies/status
      - kvcachetransferpolicies/status
      - modellifecycles/status
      - placementpolicies/status
      - tenantprofiles/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["fleet.llm-d.ai"]
    resources:
      - fleetclusters/finalizers
      - fleetinferencepools/finalizers
      - fleetintents/finalizers
      - fleetoperations/finalizers
    verbs: ["update"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fleet-llm-d.fullname" . }}-controller
  labels:
    {{- include "fleet-llm-d.labels" . | nindent 4 }}
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "fleet-llm-d.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ default (printf "%s-controller" (include "fleet-llm-d.fullname" .)) .Values.controller.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if and .Values.rbac.create .Values.agent.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fleet-llm-d.fullname" . }}-agent
  labels:
    {{- include "fleet-llm-d.labels" . | nindent 4 }}
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fleet-llm-d.fullname" . }}-agent
  labels:
    {{- include "fleet-llm-d.labels" . | nindent 4 }}
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "fleet-llm-d.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ default (printf "%s-agent" (include "fleet-llm-d.fullname" .)) .Values.agent.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
