{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleet-llm-d.fullname" . }}-agent
  labels:
    {{- include "fleet-llm-d.labels" . | nindent 4 }}
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.agent.podAnnotations | nindent 8 }}
      labels:
        app.kubernetes.io/name: fleet-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: fleet-llm-d
        {{- with .Values.agent.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ default (printf "%s-agent" (include "fleet-llm-d.fullname" .)) .Values.agent.serviceAccount.name }}
      automountServiceAccountToken: true
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fleet-agent
          image: "{{ .Values.agent.image.repository }}:{{ default .Chart.AppVersion .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: FLEET_CONTROL_PLANE_URL
              {{- if .Values.agent.controlPlaneURL }}
              value: {{ .Values.agent.controlPlaneURL | quote }}
              {{- else if .Values.controller.enabled }}
              value: {{ printf "http://%s-controller.%s.svc.cluster.local:%v" (include "fleet-llm-d.fullname" .) .Release.Namespace .Values.controller.ports.api | quote }}
              {{- else }}
              valueFrom:
                configMapKeyRef:
                  name: {{ required "agent.controlPlaneConfigMap.existingConfigMap is required for a spoke without an in-chart controller" .Values.agent.controlPlaneConfigMap.existingConfigMap }}
                  key: {{ .Values.agent.controlPlaneConfigMap.key }}
                  optional: false
              {{- end }}
            - name: FLEET_CLUSTER_ID
              {{- if .Values.clusterIdentity.clusterId }}
              value: {{ .Values.clusterIdentity.clusterId | quote }}
              {{- else }}
              valueFrom:
                configMapKeyRef:
                  name: {{ required "clusterIdentity.existingConfigMap is required when clusterId is empty" .Values.clusterIdentity.existingConfigMap }}
                  key: {{ .Values.clusterIdentity.key }}
                  optional: false
              {{- end }}
            - name: FLEET_PROXY_PORT
              value: {{ .Values.agent.ports.proxy | quote }}
            - name: FLEET_UPSTREAM_URL
              value: {{ .Values.agent.upstreamURL | quote }}
            {{- with .Values.agent.advertisedHealthURL }}
            - name: FLEET_CLUSTER_HEALTH_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agent.advertisedInferenceURL }}
            - name: FLEET_CLUSTER_INFERENCE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agent.localPrometheusURL }}
            - name: FLEET_LOCAL_PROMETHEUS_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.agent.ports.proxy }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: proxy
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: proxy
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: proxy
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
