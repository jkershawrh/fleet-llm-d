profile: federated-hub

controller:
  enabled: true
  replicaCount: 1
  podAnnotations:
    fleet.llm-d.ai/mesh-enabled: "true"
    fleet.llm-d.ai/peer-port: "8443"
  extraEnv:
    - name: FLEET_FEDERATION_ENABLED
      value: "true"
    - name: FLEET_PEER_DISCOVERY
      value: dns

gateway:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

agent:
  enabled: false

podDisruptionBudget:
  controller:
    enabled: false
  gateway:
    enabled: true
    minAvailable: 1
  agent:
    enabled: false
