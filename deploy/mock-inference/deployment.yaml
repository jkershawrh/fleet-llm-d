---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-inference
  labels:
    app: mock-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-inference
  template:
    metadata:
      labels:
        app: mock-inference
    spec:
      containers:
        - name: mock-inference
          image: quay.io/fleet-llm-d/mock-inference:latest
          ports:
            - containerPort: 8080
          env:
            - name: MOCK_LATENCY_MIN_MS
              value: "200"
            - name: MOCK_LATENCY_MAX_MS
              value: "800"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: mock-inference
  labels:
    app: mock-inference
spec:
  selector:
    app: mock-inference
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
