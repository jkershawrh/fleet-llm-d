apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-redis
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-redis
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-redis
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
