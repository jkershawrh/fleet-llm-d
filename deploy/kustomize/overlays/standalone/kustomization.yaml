apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fleet-llm-d
resources:
  - ../../base
  - postgres.yaml
  - redis.yaml
  - pdb.yaml
patches:
  - target:
      kind: Deployment
      name: fleet-controller
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fleet-controller
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: fleet-controller
                resources:
                  limits:
                    cpu: "1"
                    memory: 1Gi
