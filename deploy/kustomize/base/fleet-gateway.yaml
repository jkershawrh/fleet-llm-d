apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-gateway
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      serviceAccountName: fleet-gateway
      containers:
        - name: fleet-gateway
          image: ghcr.io/llm-d/fleet-gateway:latest
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: proxy
              containerPort: 8000
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fleet-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
