apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-gateway
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: fleet-gateway
      containers:
        - name: fleet-gateway
          image: ghcr.io/llm-d/fleet-gateway:0.2.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: FLEET_CONTROL_PLANE_URL
              value: http://fleet-controller.fleet-llm-d.svc.cluster.local:8080
            - name: FLEET_GATEWAY_PORT
              value: "8080"
            - name: FLEET_HEALTH_PORT
              value: "8081"
            - name: FLEET_METRICS_PORT
              value: "9090"
            - name: FLEET_LB_STRATEGY
              value: weighted
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-gateway-observability
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
  ports:
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fleet-gateway
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fleet-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
