apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-controller
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-controller
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      serviceAccountName: fleet-controller
      containers:
        - name: fleet-controller
          image: ghcr.io/llm-d/fleet-controller:latest
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
