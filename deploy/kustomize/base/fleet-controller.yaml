apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-controller
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-controller
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: fleet-controller
      containers:
        - name: fleet-controller
          image: ghcr.io/llm-d/fleet-controller:0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - --port=8080
            - --metrics-port=9091
            - --mode=control
            - --ledger-mode=disabled
            - --kube-api=https://kubernetes.default.svc
            - --namespace=fleet-llm-d
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: api
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-controller
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-controller
    app.kubernetes.io/component: controller
  ports:
    - name: api
      port: 8080
      targetPort: api
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: metrics
      protocol: TCP
