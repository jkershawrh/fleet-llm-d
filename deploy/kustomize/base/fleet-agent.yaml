apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      automountServiceAccountToken: true
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: fleet-agent
      containers:
        - name: fleet-agent
          image: ghcr.io/llm-d/fleet-agent:0.2.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: FLEET_CONTROL_PLANE_URL
              value: http://fleet-controller.fleet-llm-d.svc.cluster.local:8080
            - name: FLEET_CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: fleet-cluster-identity
                  key: cluster-id
                  optional: false
            - name: FLEET_PROXY_PORT
              value: "8090"
          ports:
            - name: proxy
              containerPort: 8090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: proxy
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: proxy
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: proxy
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
  ports:
    - name: proxy
      port: 8090
      targetPort: proxy
      protocol: TCP
