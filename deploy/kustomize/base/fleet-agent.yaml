apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: fleet-llm-d
    spec:
      serviceAccountName: fleet-agent
      containers:
        - name: fleet-agent
          image: ghcr.io/llm-d/fleet-agent:latest
          env:
            - name: FLEET_CONTROL_PLANE_URL
              value: http://fleet-controller.fleet-llm-d.svc.cluster.local:8080
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-agent
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: fleet-llm-d
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/component: agent
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
