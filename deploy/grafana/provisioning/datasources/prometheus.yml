apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  - name: Fleet Controller
    uid: fleet-controller
    type: prometheus
    access: proxy
    url: ${FLEET_CONTROLLER_METRICS_URL:-http://host.containers.internal:9090}
    editable: true
    jsonData:
      timeInterval: "15s"

  - name: ARE Ledger
    uid: are-ledger
    type: prometheus
    access: proxy
    url: ${ARE_LEDGER_METRICS_URL:-http://host.containers.internal:48083}
    editable: true
    jsonData:
      timeInterval: "15s"

  - name: dev-cluster-1 Prometheus
    uid: dev-cluster-1-prometheus
    type: prometheus
    access: proxy
    url: ${OBERON_PROMETHEUS_URL:-https://prometheus-k8s-openshift-monitoring.apps.dev-cluster-1.example-domain.com/api}
    editable: true
    jsonData:
      timeInterval: "30s"
      tlsSkipVerify: true
