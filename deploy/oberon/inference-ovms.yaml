apiVersion: v1
kind: Service
metadata:
  name: ovms-granite-external
  namespace: fleet-llm-d
  labels:
    app.kubernetes.io/part-of: fleet-llm-d
    fleet.llm-d.ai/runtime: ovms
spec:
  type: ExternalName
  externalName: ovms-sovereign-granite.sovereign-ai-lab.svc.cluster.local
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: granite-ovms-pool
  namespace: fleet-llm-d
  labels:
    fleet.llm-d.ai/model: granite-sovereign
    fleet.llm-d.ai/runtime: ovms
    fleet.llm-d.ai/hardware: cpu-intel-amx
spec:
  targetPorts:
    - number: 8080
  selector:
    matchLabels:
      fleet.llm-d.ai/runtime: ovms
  endpointPickerRef:
    name: fleet-controller
    kind: Service
    port:
      number: 8080
