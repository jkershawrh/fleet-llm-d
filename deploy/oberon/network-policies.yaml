---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: fleet-llm-d
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fleet-controller
  namespace: fleet-llm-d
spec:
  podSelector:
    matchLabels:
      app: fleet-controller
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: governed-cognitive-loop
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
        - podSelector:
            matchLabels:
              app: ecosystem-soak
        - podSelector:
            matchLabels:
              app: resilience-test
        - podSelector:
            matchLabels:
              app: fleet-agent-sim
      ports:
        - port: 8080
          protocol: TCP
        - port: 9091
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: mock-inference
      ports:
        - port: 8080
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: modelplane-mock
      ports:
        - port: 8090
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sovereign-ai-lab
      ports:
        - port: 28099
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mock-inference
  namespace: fleet-llm-d
spec:
  podSelector:
    matchLabels:
      app: mock-inference
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fleet-controller
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-modelplane-mock
  namespace: fleet-llm-d
spec:
  podSelector:
    matchLabels:
      app: modelplane-mock
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fleet-controller
      ports:
        - port: 8090
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-deepfield-fleet
  namespace: fleet-llm-d
spec:
  podSelector:
    matchLabels:
      app: deepfield-fleet
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: governed-cognitive-loop
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
  namespace: fleet-llm-d
spec:
  podSelector:
    matchLabels:
      app: fleet-grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
    - to:
        - podSelector:
            matchLabels:
              app: fleet-controller
      ports:
        - port: 9091
          protocol: TCP
