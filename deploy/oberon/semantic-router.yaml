apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-router
  namespace: fleet-llm-d
  labels:
    app: semantic-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-router
  template:
    metadata:
      labels:
        app: semantic-router
    spec:
      initContainers:
        - name: patch-config
          image: ghcr.io/vllm-project/semantic-router/extproc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp -a /app/config/* /config-out/
              sed -i 's/method: fuzzy/method: ngram/' /config-out/config.yaml
              sed -i 's/fuzzy_match: true/ngram_threshold: 0.4/' /config-out/config.yaml
              sed -i 's/fuzzy_threshold: 82/ngram_arity: 3/' /config-out/config.yaml
              sed -i '/semantic_cache:/,/enabled:/{s/enabled: true/enabled: false/}' /config-out/config.yaml
              # TODO(Issue #2067): remove when upstream fixes OnceLock factory race.
              # The multimodal model wins the global factory, blocking mmBERT/qwen3
              # text embedding registration. No config-only workaround exists.
              # Disabling multimodal causes OOM; switching model_type still hits -1.
              echo "Config patched:"
              diff /app/config/config.yaml /config-out/config.yaml || true
          volumeMounts:
            - name: config-patched
              mountPath: /config-out
      containers:
        - name: semantic-router
          image: ghcr.io/vllm-project/semantic-router/extproc:latest
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 9090
              name: health
            - containerPort: 9190
              name: metrics
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: hf-cache
              mountPath: /tmp/hf-cache
            - name: cache
              mountPath: /.cache
            - name: vector-store
              mountPath: /var/lib/vsr
            - name: config-patched
              mountPath: /app/config
          startupProbe:
            httpGet:
              path: /startup-status
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /startup-status
              port: 9090
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /startup-status
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 6Gi
      volumes:
        - name: models
          emptyDir: {}
        - name: hf-cache
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: vector-store
          emptyDir: {}
        - name: config-patched
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-router
  namespace: fleet-llm-d
  labels:
    app: semantic-router
spec:
  selector:
    app: semantic-router
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
    - name: health
      port: 9090
      targetPort: 9090
    - name: metrics
      port: 9190
      targetPort: 9190
