version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fleet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_llm_d
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_llm_d"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: fleet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fleet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  kafka:
    image: bitnami/kafka:latest
    container_name: fleet-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: fleet-llm-d-kraft-cluster-01
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: fleet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    container_name: fleet-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────
  # ARE Immutable Ledger — EXTERNAL SHARED INFRASTRUCTURE
  #
  # The ARE ledger is an independent compliance platform that lives
  # OUTSIDE the fleet-llm-d ecosystem. It is shared enterprise
  # infrastructure that any platform can write to — fleet-llm-d,
  # MaaS, RHACM, agentic frameworks, CI/CD, security tools, etc.
  #
  # In production, the ledger runs on its own infrastructure with
  # its own database, operated independently of fleet-llm-d.
  # It is included here for local development convenience only.
  # ──────────────────────────────────────────────────────────────

  are-ledger-db:
    image: postgres:16
    container_name: are-ledger-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: are_ledger
    volumes:
      - are_ledger_db_data:/var/lib/postgresql/data
    networks:
      - are-ledger-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  are-ledger:
    image: ghcr.io/fleet-llm-d/are-immutable-ledger:latest
    ports:
      - "19292:9092"    # gRPC — fleet-llm-d and other platforms connect here
      - "18080:8080"    # health
      - "18083:8083"    # metrics (Prometheus scrape target)
    environment:
      ARE_LEDGER_DB_HOST: are-ledger-db
      ARE_LEDGER_DB_PORT: "5432"
      ARE_LEDGER_DB_USER: ledger
      ARE_LEDGER_DB_PASSWORD: ledger
      ARE_LEDGER_DB_NAME: are_ledger
      RUST_LOG: info
    depends_on:
      are-ledger-db:
        condition: service_healthy
    networks:
      - are-ledger-net
      - fleet           # bridge to fleet network so fleet-llm-d can reach it
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  are-gateway:
    image: ghcr.io/fleet-llm-d/are-immutable-ledger-gateway:latest
    ports:
      - "18099:8099"    # REST API — dashboards, compliance tools connect here
    environment:
      LEDGER_GRPC_HOST: are-ledger
      LEDGER_GRPC_PORT: "9092"
    depends_on:
      are-ledger:
        condition: service_healthy
    networks:
      - are-ledger-net
      - fleet

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  are_ledger_db_data:

networks:
  fleet:
  are-ledger-net:
    # Separate network for the ARE ledger stack.
    # In production, the ledger runs on its own infrastructure.
    # The bridge to the fleet network is for local dev convenience.
    driver: bridge
