version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fleet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_llm_d
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_llm_d"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  # NOTE: Redis and native Kafka services are not included. The fleet
  # controller has no Redis or Kafka client dependencies (lib/pq is the
  # sole Go dependency). Events are published via an HTTP sink
  # (pkg/store/events/http_publisher.go) that can target any
  # CloudEvents-compatible endpoint including a Kafka REST proxy.
  # To add Kafka streaming: deploy Strimzi Bridge and set
  # --event-endpoint=http://kafka-bridge:8080/topics/fleet-events.
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: fleet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: fleet-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - fleet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ──────────────────────────────────────────────────────────────
  # ARE Immutable Ledger — EXTERNAL SHARED INFRASTRUCTURE
  #
  # The ARE ledger is an independent compliance platform that lives
  # OUTSIDE the fleet-llm-d ecosystem. It is shared enterprise
  # infrastructure that any platform can write to — fleet-llm-d,
  # MaaS, RHACM, agentic frameworks, CI/CD, security tools, etc.
  #
  # In production, the ledger runs on its own infrastructure with
  # its own database, operated independently of fleet-llm-d.
  # It is included here for local development convenience only.
  # ──────────────────────────────────────────────────────────────

  are-ledger-db:
    image: postgres:16
    container_name: are-ledger-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: are_ledger
    volumes:
      - are_ledger_db_data:/var/lib/postgresql/data
    networks:
      - are-ledger-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  are-ledger:
    image: ghcr.io/fleet-llm-d/are-immutable-ledger:latest
    ports:
      - "19292:9092"    # gRPC — fleet-llm-d and other platforms connect here
      - "18080:8080"    # health
      - "18083:8083"    # metrics (Prometheus scrape target)
    environment:
      ARE_LEDGER_DB_HOST: are-ledger-db
      ARE_LEDGER_DB_PORT: "5432"
      ARE_LEDGER_DB_USER: ledger
      ARE_LEDGER_DB_PASSWORD: ledger
      ARE_LEDGER_DB_NAME: are_ledger
      RUST_LOG: info
    depends_on:
      are-ledger-db:
        condition: service_healthy
    networks:
      - are-ledger-net
      - fleet           # bridge to fleet network so fleet-llm-d can reach it
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  are-gateway:
    image: ghcr.io/fleet-llm-d/are-immutable-ledger-gateway:latest
    ports:
      - "18099:8099"    # REST API — dashboards, compliance tools connect here
    environment:
      LEDGER_GRPC_HOST: are-ledger
      LEDGER_GRPC_PORT: "9092"
    depends_on:
      are-ledger:
        condition: service_healthy
    networks:
      - are-ledger-net
      - fleet
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  are_ledger_db_data:

networks:
  fleet:
  are-ledger-net:
    # Separate network for the ARE ledger stack.
    # In production, the ledger runs on its own infrastructure.
    # The bridge to the fleet network is for local dev convenience.
    driver: bridge
