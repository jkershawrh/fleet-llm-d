apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fleetintents.fleet.llm-d.ai
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: fleet.llm-d.ai
  names:
    kind: FleetIntent
    listKind: FleetIntentList
    plural: fleetintents
    singular: fleetintent
    shortNames: [fi]
    categories: [fleet-llm-d]
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.actionClass
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Expires
          type: date
          jsonPath: .spec.expiresAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [actionClass, targetRef, decisionPackageRef, proposer, expiresAt, correlationId, idempotencyKey]
              properties:
                actionClass: {type: string, minLength: 1}
                targetRef:
                  type: object
                  required: [name]
                  x-kubernetes-preserve-unknown-fields: true
                decisionPackageRef:
                  type: object
                  required: [uri, sha256]
                  properties:
                    uri: {type: string, minLength: 1}
                    sha256:
                      type: string
                      pattern: "^[a-fA-F0-9]{64}$"
                    signature: {type: string}
                proposer:
                  type: object
                  required: [subject, attestationRef, ceiling]
                  properties:
                    subject: {type: string, minLength: 1}
                    attestationRef: {type: string, minLength: 1}
                    ceiling: {type: string, minLength: 1}
                evidence:
                  type: array
                  items:
                    type: object
                    required: [uri, sha256]
                    x-kubernetes-preserve-unknown-fields: true
                expiresAt: {type: string, format: date-time}
                approvals:
                  type: array
                  items:
                    type: object
                    required: [subject, role, approvedAt]
                    x-kubernetes-preserve-unknown-fields: true
                correlationId: {type: string, minLength: 1}
                idempotencyKey: {type: string, minLength: 1}
                parameters:
                  type: object
                  maxProperties: 64
                  x-kubernetes-preserve-unknown-fields: true
                  description: Bounded action-specific JSON projected from the REST intent.
                authorizationRef:
                  type: object
                  required: [grantId, subject, actionClass, objectUid, specDigest, audience, expiresAt, idempotencyKey]
                  properties:
                    grantId: {type: string, minLength: 1}
                    subject: {type: string, minLength: 1}
                    actionClass: {type: string, minLength: 1}
                    objectUid: {type: string, minLength: 1}
                    specDigest:
                      type: string
                      pattern: "^[a-fA-F0-9]{64}$"
                    audience: {type: string, minLength: 1}
                    expiresAt: {type: string, format: date-time}
                    idempotencyKey: {type: string, minLength: 1}
                    breakGlass: {type: boolean, default: false}
                    incidentRef: {type: string}
                  x-kubernetes-validations:
                    - rule: "self.audience == 'fleet-llm-d'"
                      message: audience must be fleet-llm-d
                    - rule: "!has(self.breakGlass) || !self.breakGlass || (has(self.incidentRef) && size(self.incidentRef) > 0)"
                      message: incidentRef is required for break-glass grants
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, lastTransitionTime]
                    properties:
                      type: {type: string}
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration: {type: integer, format: int64}
                      reason: {type: string}
                      message: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
                specDigest:
                  type: string
                  pattern: "^[a-fA-F0-9]{64}$"
                providerRefs:
                  type: array
                  items:
                    type: object
                    required: [type, name]
                    x-kubernetes-preserve-unknown-fields: true
                freshness:
                  type: object
                  properties:
                    observedAt: {type: string, format: date-time}
                    validUntil: {type: string, format: date-time}
                    stale: {type: boolean}
                correlationId: {type: string}
                lastSuccessfulReconciliation: {type: string, format: date-time}
                phase:
                  type: string
                  enum: [RECEIVED, ACCEPTED, PLANNED, GOVERNANCE_PENDING, AUTHORIZED, ACTUATING, OBSERVING, VERIFIED, EVIDENCE_PENDING, SUCCEEDED, REJECTED, DEFERRED, EXPIRED, FAILED, ROLLING_BACK, ROLLED_BACK, QUARANTINED]
                operationRefs:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: {type: string}
                acceptedAt: {type: string, format: date-time}
