apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fleetoperations.fleet.llm-d.ai
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: fleet.llm-d.ai
  names:
    kind: FleetOperation
    listKind: FleetOperationList
    plural: fleetoperations
    singular: fleetoperation
    shortNames: [fo]
    categories: [fleet-llm-d]
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.actionClass
        - name: Provider
          type: string
          jsonPath: .spec.provider.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [intentRef, actionClass, targetRef, idempotencyKey]
              properties:
                intentRef:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string, minLength: 1}
                actionClass: {type: string, minLength: 1}
                targetRef:
                  type: object
                  required: [name]
                  x-kubernetes-preserve-unknown-fields: true
                planDigest:
                  type: string
                  pattern: "^[a-fA-F0-9]{64}$"
                provider:
                  type: object
                  required: [type, name]
                  x-kubernetes-preserve-unknown-fields: true
                authorizationRef:
                  type: object
                  required: [grantId, actionClass, specDigest, audience, expiresAt, idempotencyKey]
                  x-kubernetes-preserve-unknown-fields: true
                idempotencyKey: {type: string, minLength: 1}
                compensates:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, lastTransitionTime]
                    properties:
                      type: {type: string}
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration: {type: integer, format: int64}
                      reason: {type: string}
                      message: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
                specDigest:
                  type: string
                  pattern: "^[a-fA-F0-9]{64}$"
                providerRefs:
                  type: array
                  items:
                    type: object
                    required: [type, name]
                    x-kubernetes-preserve-unknown-fields: true
                freshness:
                  type: object
                  properties:
                    observedAt: {type: string, format: date-time}
                    validUntil: {type: string, format: date-time}
                    stale: {type: boolean}
                correlationId: {type: string}
                lastSuccessfulReconciliation: {type: string, format: date-time}
                phase:
                  type: string
                  enum: [RECEIVED, ACCEPTED, PLANNED, GOVERNANCE_PENDING, AUTHORIZED, ACTUATING, OBSERVING, VERIFIED, EVIDENCE_PENDING, SUCCEEDED, REJECTED, DEFERRED, EXPIRED, FAILED, ROLLING_BACK, ROLLED_BACK, QUARANTINED]
                transitions:
                  type: array
                  maxItems: 256
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [sequence]
                  items:
                    type: object
                    required: [sequence, phase, at, reason]
                    properties:
                      sequence: {type: integer, format: int64, minimum: 1}
                      phase:
                        type: string
                        enum: [RECEIVED, ACCEPTED, PLANNED, GOVERNANCE_PENDING, AUTHORIZED, ACTUATING, OBSERVING, VERIFIED, EVIDENCE_PENDING, SUCCEEDED, REJECTED, DEFERRED, EXPIRED, FAILED, ROLLING_BACK, ROLLED_BACK, QUARANTINED]
                      at: {type: string, format: date-time}
                      reason: {type: string, minLength: 1}
                      message: {type: string}
                      evidence:
                        type: array
                        items:
                          type: object
                          required: [uri, sha256]
                          x-kubernetes-preserve-unknown-fields: true
                result:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                ledgerReceipts:
                  type: array
                  items:
                    type: object
                    required: [entryId, chainHash, sequence, recordedAt, purpose]
                    properties:
                      entryId: {type: string, minLength: 1}
                      chainHash: {type: string, minLength: 1}
                      sequence: {type: integer, format: int64, minimum: 0}
                      recordedAt: {type: string, format: date-time}
                      purpose:
                        type: string
                        enum: [admission, authorization, outcome]
                compensationRef:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
          x-kubernetes-validations:
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['PLANNED', 'GOVERNANCE_PENDING', 'AUTHORIZED', 'ACTUATING', 'OBSERVING', 'VERIFIED', 'EVIDENCE_PENDING', 'SUCCEEDED', 'ROLLING_BACK', 'ROLLED_BACK', 'QUARANTINED']) || (has(self.spec.planDigest) && has(self.spec.provider))"
              message: planDigest and provider are required at PLANNED and later execution phases
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['AUTHORIZED', 'ACTUATING', 'OBSERVING', 'VERIFIED', 'EVIDENCE_PENDING', 'SUCCEEDED', 'ROLLING_BACK', 'ROLLED_BACK']) || has(self.spec.authorizationRef)"
              message: authorizationRef is required at AUTHORIZED and later execution phases
