apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fleetoperations.fleet.llm-d.ai
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: fleet.llm-d.ai
  names:
    kind: FleetOperation
    listKind: FleetOperationList
    plural: fleetoperations
    singular: fleetoperation
    shortNames: [fo]
    categories: [fleet-llm-d]
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.actionClass
        - name: Provider
          type: string
          jsonPath: .spec.provider.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: {type: string}
            kind: {type: string}
            metadata: {type: object}
            spec:
              type: object
              required: [intentRef, actionClass, targetRef, idempotencyKey]
              properties:
                intentRef:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string, minLength: 1}
                actionClass: {type: string, minLength: 1, maxLength: 128}
                targetRef:
                  type: object
                  required: [name]
                  x-kubernetes-preserve-unknown-fields: true
                planDigest:
                  type: string
                  maxLength: 64
                  pattern: "^[a-fA-F0-9]{64}$"
                provider:
                  type: object
                  required: [type, name]
                  x-kubernetes-preserve-unknown-fields: true
                authorizationRef:
                  type: object
                  required: [grantId, subject, actionClass, objectUid, specDigest, audience, expiresAt, idempotencyKey]
                  properties:
                    grantId: {type: string, minLength: 1}
                    subject: {type: string, minLength: 1}
                    actionClass: {type: string, minLength: 1, maxLength: 128}
                    objectUid: {type: string, minLength: 1}
                    specDigest:
                      type: string
                      maxLength: 64
                      pattern: "^[a-fA-F0-9]{64}$"
                    audience: {type: string, minLength: 1, maxLength: 64}
                    expiresAt: {type: string, format: date-time, maxLength: 64}
                    idempotencyKey: {type: string, minLength: 1, maxLength: 256}
                    breakGlass: {type: boolean}
                    incidentRef: {type: string}
                  x-kubernetes-validations:
                    - rule: "self.audience == 'fleet-llm-d'"
                      message: audience must be fleet-llm-d
                    - rule: "!has(self.breakGlass) || !self.breakGlass || (has(self.incidentRef) && size(self.incidentRef) > 0)"
                      message: incidentRef is required for break-glass grants
                idempotencyKey: {type: string, minLength: 1, maxLength: 256}
                compensates:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status, reason, lastTransitionTime]
                    properties:
                      type: {type: string}
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration: {type: integer, format: int64}
                      reason: {type: string}
                      message: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
                specDigest:
                  type: string
                  pattern: "^[a-fA-F0-9]{64}$"
                providerRefs:
                  type: array
                  items:
                    type: object
                    required: [type, name]
                    x-kubernetes-preserve-unknown-fields: true
                freshness:
                  type: object
                  properties:
                    observedAt: {type: string, format: date-time}
                    validUntil: {type: string, format: date-time}
                    stale: {type: boolean}
                correlationId: {type: string}
                lastSuccessfulReconciliation: {type: string, format: date-time}
                phase:
                  type: string
                  enum: [RECEIVED, ACCEPTED, PLANNED, GOVERNANCE_PENDING, AUTHORIZED, ACTUATING, OBSERVING, VERIFIED, EVIDENCE_PENDING, SUCCEEDED, REJECTED, DEFERRED, EXPIRED, FAILED, ROLLING_BACK, ROLLED_BACK, QUARANTINED]
                transitions:
                  type: array
                  maxItems: 256
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [sequence]
                  items:
                    type: object
                    required: [sequence, phase, at, reason]
                    properties:
                      sequence: {type: integer, format: int64, minimum: 1}
                      phase:
                        type: string
                        enum: [RECEIVED, ACCEPTED, PLANNED, GOVERNANCE_PENDING, AUTHORIZED, ACTUATING, OBSERVING, VERIFIED, EVIDENCE_PENDING, SUCCEEDED, REJECTED, DEFERRED, EXPIRED, FAILED, ROLLING_BACK, ROLLED_BACK, QUARANTINED]
                      at: {type: string, format: date-time, maxLength: 64}
                      reason: {type: string, minLength: 1}
                      message: {type: string}
                      ledgerEntryId: {type: string, minLength: 1}
                      evidence:
                        type: array
                        items:
                          type: object
                          required: [uri, sha256]
                          x-kubernetes-preserve-unknown-fields: true
                result:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    observedDigest:
                      type: string
                      maxLength: 64
                      pattern: "^[a-fA-F0-9]{64}$"
                ledgerReceipts:
                  type: array
                  maxItems: 64
                  items:
                    type: object
                    required: [entryId, entryHash, entryType, chainPosition, writtenTs, inputHash, purpose]
                    properties:
                      entryId: {type: string, minLength: 1}
                      entryHash: {type: string, minLength: 1}
                      entryType: {type: string, minLength: 1, maxLength: 128}
                      chainPosition: {type: integer, format: int64, minimum: 1}
                      writtenTs: {type: integer, format: int64, minimum: 1}
                      inputHash:
                        type: string
                        maxLength: 64
                        pattern: "^[a-fA-F0-9]{64}$"
                      purpose:
                        type: string
                        enum: [admission, authorization_decision, outcome]
                compensationRef:
                  type: object
                  required: [name]
                  properties:
                    name: {type: string}
          x-kubernetes-validations:
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['PLANNED', 'GOVERNANCE_PENDING', 'AUTHORIZED', 'ACTUATING', 'OBSERVING', 'VERIFIED', 'EVIDENCE_PENDING', 'SUCCEEDED', 'ROLLING_BACK', 'ROLLED_BACK', 'QUARANTINED']) || (has(self.spec.planDigest) && has(self.spec.provider))"
              message: planDigest and provider are required at PLANNED and later execution phases
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['AUTHORIZED', 'ACTUATING', 'OBSERVING', 'VERIFIED', 'EVIDENCE_PENDING', 'SUCCEEDED', 'ROLLING_BACK', 'ROLLED_BACK']) || has(self.spec.authorizationRef)"
              message: authorizationRef is required at AUTHORIZED and later execution phases
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['AUTHORIZED', 'ACTUATING', 'OBSERVING', 'VERIFIED', 'EVIDENCE_PENDING', 'SUCCEEDED', 'ROLLING_BACK', 'ROLLED_BACK']) || (has(self.spec.authorizationRef) && self.spec.authorizationRef.actionClass == self.spec.actionClass && self.spec.authorizationRef.specDigest == self.spec.planDigest && self.spec.authorizationRef.idempotencyKey == self.spec.idempotencyKey && self.spec.authorizationRef.audience == 'fleet-llm-d')"
              message: authorizationRef must be fully bound to the operation action, plan, idempotency key, and fleet audience
            - rule: "!has(self.status) || !has(self.status.phase) || !(self.status.phase in ['AUTHORIZED', 'ACTUATING']) || (has(self.status.transitions) && self.status.transitions.exists(t, t.phase == self.status.phase && timestamp(self.spec.authorizationRef.expiresAt) > timestamp(t.at)))"
              message: authorizationRef must be unexpired when AUTHORIZED or ACTUATING is recorded
            - rule: "!has(self.status) || self.status.phase != 'SUCCEEDED' || (has(self.status.result) && has(self.status.result.observedDigest) && has(self.status.ledgerReceipts) && self.status.ledgerReceipts.exists(r, r.purpose == 'outcome' && r.entryType == 'fleet.operation.verified' && r.inputHash == self.status.result.observedDigest))"
              message: SUCCEEDED requires an observed digest and a matching immutable-ledger fleet.operation.verified outcome receipt
